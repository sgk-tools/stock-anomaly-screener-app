name: Update stock anomaly candidates

on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * 1-5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run screener
        run: python scripts/screen_stocks.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/candidates.json data/update_log.json data/raw/*.zip || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update stock anomaly candidates"
            git push
          fi
